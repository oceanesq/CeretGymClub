<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Céret Gym Club</title>
  <meta name="description" content="Contactez le Céret Gym Club à Céret (66). Adresse, email, formulaire de contact et carte interactive.">
  <meta property="og:title" content="Contact — Céret Gym Club">
  <meta property="og:image" content="assets/logo.png">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <header class="page-hero">
    <div class="container">
      <h1>Nous contacter</h1>
      <p>Une question ? On vous répond dans les meilleurs délais.</p>
    </div>
  </header>

  <main id="main-content">
    <section class="section">
      <div class="container">
        <div>

          <!-- Coordonnées (générées depuis data/club.js) -->

            <div id="contact-info" style="display:grid;text-align:center;max-width:480px;margin:0 auto;gap:2.5rem;">
              <h2 >Nos coordonnées</h2>
              <div>
                <div style="font-size:2rem;margin-bottom:.5rem;">📍</div>
                <p style="font-family:'Raleway',sans-serif;font-weight:700;font-size:1.05rem;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">Adresse</p>
                <span style="display:block;width:2rem;height:3px;background:var(--gold);margin:0 auto .75rem;border-radius:2px;"></span>
                <p id="contact-adresse" style="color:var(--gray-700);line-height:1.7;"></p>
              </div>

              <div>
                <div style="font-size:2rem;margin-bottom:.5rem;">✉️</div>
                <p style="font-family:'Raleway',sans-serif;font-weight:700;font-size:1.05rem;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">Email</p>
                <span style="display:block;width:2rem;height:3px;background:var(--gold);margin:0 auto .75rem;border-radius:2px;"></span>
                <a id="contact-email" style="color:var(--navy);font-weight:600;"></a>
              </div>

              <div>
                <div style="font-size:2rem;margin-bottom:.5rem;">🕐</div>
                <p style="font-family:'Raleway',sans-serif;font-weight:700;font-size:1.05rem;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">Présence au gymnase</p>
                <span style="display:block;width:2rem;height:3px;background:var(--gold);margin:0 auto .75rem;border-radius:2px;"></span>
                <ul id="contact-horaires" style="list-style:none;display:grid;gap:.35rem;color:var(--gray-700);font-size:.9rem;"></ul>
              </div>

            </div>
        </div>

        <!-- Carte Google Maps (src mis à jour depuis data/club.js) -->
        <div class="map-container" aria-label="Carte de localisation du club">
          <iframe
            id="contact-map"
            src=""
            width="100%"
            height="400"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Localisation du Céret Gym Club"
          ></iframe>
        </div>

      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="data/club.js"></script>
  <script src="data/partenaires.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
