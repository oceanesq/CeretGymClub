<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Céret Gym Club</title>
  <meta name="description" content="Contactez le Céret Gym Club à Céret (66). Adresse, email, formulaire de contact et carte interactive.">
  <meta property="og:title" content="Contact — Céret Gym Club">
  <meta property="og:image" content="assets/logo.png">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <header class="page-hero">
    <div class="container">
      <h1>Nous contacter</h1>
      <p>Une question ? On vous répond dans les meilleurs délais.</p>
    </div>
  </header>

  <main id="main-content">
    <section class="section">
      <div class="container">
        <div class="contact-layout">

          <!-- Coordonnées (générées depuis data/club.js) -->
          <aside aria-labelledby="coords-title">
            <h2 id="coords-title">Nos coordonnées</h2>
            <div id="contact-info"></div>
          </aside>

          <!-- Formulaire de contact -->
          <div>
            <form
              id="contact-form"
              class="contact-form"
              name="contact"
              method="POST"
              action="https://formspree.io/f/VOTRE_ID_FORMSPREE"
              data-netlify="true"
              netlify-honeypot="website"
              aria-label="Formulaire de contact"
            >
              <!-- Champ caché Netlify -->
              <input type="hidden" name="form-name" value="contact">

              <h3>Envoyer un message</h3>

              <!-- Honeypot anti-spam -->
              <div class="hp-field" aria-hidden="true">
                <label>Ne pas remplir si vous êtes humain : <input type="text" name="website" tabindex="-1" autocomplete="off"></label>
              </div>

              <div class="form-group">
                <label for="name">Nom complet <span aria-hidden="true">*</span></label>
                <input type="text" id="name" name="name" required placeholder="Votre nom" autocomplete="name">
              </div>

              <div class="form-group">
                <label for="email">Adresse email <span aria-hidden="true">*</span></label>
                <input type="email" id="email" name="email" required placeholder="votre@email.fr" autocomplete="email">
              </div>

              <div class="form-group">
                <label for="subject">Sujet</label>
                <select id="subject" name="subject">
                  <option value="">Choisir un sujet…</option>
                  <option value="inscription">Inscription / Renseignements</option>
                  <option value="planning">Planning des cours</option>
                  <option value="tarifs">Tarifs</option>
                  <option value="partenariat">Partenariat</option>
                  <option value="autre">Autre</option>
                </select>
              </div>

              <div class="form-group">
                <label for="message">Message <span aria-hidden="true">*</span></label>
                <textarea id="message" name="message" required placeholder="Votre message…" rows="5"></textarea>
              </div>

              <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                Envoyer le message
              </button>

              <div id="form-success" class="form-success" role="status" aria-live="polite">
                ✅ Votre message a bien été envoyé ! Nous vous répondrons dans les meilleurs délais.
              </div>
            </form>
          </div>

        </div>

        <!-- Carte Google Maps (src mis à jour depuis data/club.js) -->
        <div class="map-container" aria-label="Carte de localisation du club">
          <iframe
            id="contact-map"
            src=""
            width="100%"
            height="400"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Localisation du Céret Gym Club"
          ></iframe>
        </div>

      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="data/club.js"></script>
  <script src="data/partenaires.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
